<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Light Mode Favicon - Coral Color -->
  
  <!-- Playful Flame/Lightning Bolt with Friendly Face -->
  
  <!-- Flame/Lightning Bolt Shape (Primary) -->
  <g id="flame-bolt">
    <!-- Main flame body -->
    <path d="M 32 8 Q 28 16 28 24 Q 28 32 32 36 Q 28 32 24 40 Q 20 48 24 56 Q 28 52 32 52 Q 36 52 40 56 Q 44 48 40 40 Q 36 32 36 24 Q 36 16 32 8 Z" 
          fill="#FF6B6B" opacity="0.9"/>
    
    <!-- Flame highlight -->
    <path d="M 32 12 Q 30 18 30 24 Q 30 30 32 34 Q 30 30 28 36 Q 26 42 28 48 Q 30 44 32 44 Q 34 44 36 48 Q 38 42 36 36 Q 34 30 34 24 Q 34 18 32 12 Z" 
          fill="#FF6B6B" opacity="0.6"/>
  </g>
  
  <!-- Friendly Face -->
  <g id="face">
    <!-- Left Eye -->
    <circle cx="26" cy="28" r="2.5" fill="#FF6B6B"/>
    
    <!-- Right Eye -->
    <circle cx="38" cy="28" r="2.5" fill="#FF6B6B"/>
    
    <!-- Smile -->
    <path d="M 26 36 Q 32 40 38 36" 
          stroke="#FF6B6B" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>
  
  <!-- Accent spark -->
  <g id="spark">
    <circle cx="48" cy="16" r="1.5" fill="#FFD93D" opacity="0.9"/>
    <line x1="48" y1="12" x2="48" y2="20" stroke="#FFD93D" stroke-width="1" opacity="0.7" stroke-linecap="round"/>
    <line x1="44" y1="16" x2="52" y2="16" stroke="#FFD93D" stroke-width="1" opacity="0.7" stroke-linecap="round"/>
  </g>
</svg>
